site_name: makino's materials
site_url: https://makinote.cn/materials/
site_description: 个人材料分享 — 持续更新的安装实录、学习笔记、精选资源
site_author: makino

repo_url: https://github.com/makinotes/materials
repo_name: makinotes/materials

theme:
  name: material
  language: zh
  palette:
    scheme: default
    primary: white
    accent: indigo
  font:
    text: system-ui, -apple-system, sans-serif
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - 小龙虾安装实录:
    - lobster/index.md
  - AI 学习笔记:
    - ai-learning/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/makinotes
  generator: false
