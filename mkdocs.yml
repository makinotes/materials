site_name: makino's materials
site_url: https://makinote.cn/materials/
site_description: 个人材料分享 — 部署实录、学习笔记、精选阅读
site_author: makino

repo_url: https://github.com/makinotes/materials
repo_name: makinotes/materials

theme:
  name: material
  language: zh
  palette:
    scheme: default
    primary: white
    accent: indigo
  font:
    text: system-ui, -apple-system, sans-serif
    code: JetBrains Mono
  features:
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

hooks:
  - hooks/update_dates.py

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: false
  - attr_list
  - md_in_html
  - def_list

nav:
  - Home: index.md
  - 部署实录:
    - deploy/index.md
    - OpenClaw VPS 部署: "deploy/OpenClaw-VPS部署实录.md"
  - 学习笔记:
    - notes/index.md
    - Context Engineering: "notes/Context-Engineering上下文工程.md"
  - 精选阅读:
    - reading-lists/index.md
    - AI Agent 实践: "reading-lists/AI-Agent实践.md"
    - AI 编程: "reading-lists/AI编程.md"
    - AI 认知与趋势: "reading-lists/AI认知与趋势.md"
    - AI 学术与前沿: "reading-lists/AI学术与前沿.md"
    - AI 多模态: "reading-lists/AI多模态.md"
    - OpenClaw: "reading-lists/OpenClaw.md"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/makinotes
  generator: false
